services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tectonic
      POSTGRES_PASSWORD: tectonic
      POSTGRES_DB: tectonic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tectonic"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TECTONIC_DATABASE_URL: postgresql+asyncpg://tectonic:tectonic@postgres:5432/tectonic
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
