name: CI - Contracts

on:
  push:
    branches: [main]
    paths:
      - "packages/contracts/**"
  pull_request:
    paths:
      - "packages/contracts/**"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Compile & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/contracts/package-lock.json
      - run: npm ci
      - run: npx hardhat compile
      - run: npm test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/contracts/package-lock.json
      - run: npm ci
      - run: npm run coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contracts-coverage
          path: packages/contracts/coverage/
