name: CI - Python Libs

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
      - "packages/openclaw-bridge/**"
  pull_request:
    paths:
      - "packages/sdk/**"
      - "packages/openclaw-bridge/**"
      - ".claude/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-lint:
    name: SDK Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/sdk/pyproject.toml
            packages/openclaw-bridge/pyproject.toml
      - run: pip install ruff
      - run: ruff check tectonic/
      - run: ruff format --check tectonic/

  sdk-test:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/sdk/pyproject.toml
            packages/openclaw-bridge/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=tectonic --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sdk-coverage
          path: packages/sdk/coverage.xml

  bridge-lint:
    name: Bridge Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openclaw-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/sdk/pyproject.toml
            packages/openclaw-bridge/pyproject.toml
      - run: pip install ruff
      - run: ruff check tectonic_tools/
      - run: ruff format --check tectonic_tools/

  bridge-test:
    name: Bridge Tests
    needs: sdk-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/openclaw-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            packages/sdk/pyproject.toml
            packages/openclaw-bridge/pyproject.toml
      - run: pip install -e ../sdk
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=tectonic_tools --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bridge-coverage
          path: packages/openclaw-bridge/coverage.xml
