name: CI - API

on:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "tests/integration/**"
  pull_request:
    paths:
      - "packages/api/**"
      - "tests/integration/**"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/api/pyproject.toml
      - run: pip install ruff
      - run: ruff check app/
      - run: ruff format --check app/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=app --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: packages/api/coverage.xml

  integration:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/api/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: packages/api
      - run: pytest tests/integration/ -v
        env:
          PYTHONPATH: packages/api
