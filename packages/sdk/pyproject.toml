[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tectonic-sdk"
version = "0.1.0"
description = "Python SDK for the Tectonic Agent Commerce Protocol"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.26.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "respx>=0.20.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
