[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tectonic-openclaw-bridge"
version = "0.1.0"
description = "OpenClaw integration bridge for Tectonic"
requires-python = ">=3.11"
dependencies = [
    "tectonic-sdk",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
