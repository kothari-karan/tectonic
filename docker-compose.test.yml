version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tectonic_test
      POSTGRES_PASSWORD: tectonic_test
      POSTGRES_DB: tectonic_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tectonic_test"]
      interval: 5s
      timeout: 3s
      retries: 5
